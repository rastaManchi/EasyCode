<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <h1>ИМЯ: {{user[1]}}</h1>
    <p>Email: {{user[2]}}</p>

    {% if posts %}
        <ul>
            {%for post in posts %}
            <li>
                <h1> Title: {{post[1]}} </h1>
                <p> content: {{post[2]}} </p>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Постов нет</p>
    {% endif %}


</body>

</html>
