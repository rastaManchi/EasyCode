<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Профиль пользователя: {{ user[1] }}</h1>
    <p>Email: {{ user[2] }}</p>

    <h2>Посты пользователя:</h2>
    {% if posts %}
        <ul>
            {% for post in posts %}
                <li>
                    <h3>{{ post[1] }}</h3>
                    <p>{{ post[2] }}</p>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>У пользователя пока нет постов.</p>
    {% endif %}
</body>
</html>
