<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>главная страница</title>
</head>
<body>
    <div class="header">
        <h1>главная</h1>
        <div>
            <a href="{{ url_for('register')}}">Регистрация</a>
             <a href="{{ url_for('login')}}">Войти</a>
        </div>
    </div>

    <div>
        <input type="text" id="search_input" placeholder="Введите что нибудь">
        <button id="search_btn">Поиск</button>
    </div>



    <ul id="posts_list">
        {% for post in posts %}
            <li>
                <h2>{{post[1]}}</h2>
                <p>{{post[2]}}</p>
            </li>
        {% endfor %}
        
    </ul>

    <ul>
        {% for user in users %}
            <li>
                <a href="/profile/{{user[0]}}">{{user[1]}}</a>
            </li>
        {% endfor %}
    </ul>

    <script src="/static/main.js"></script>
</body>
</html>
