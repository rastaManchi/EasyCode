<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4>{{user[1]}}</h4>

    <ul>
        {% for notification in logs_notifications %}
            <li>
                <h3>{{ notification[2] }}</h3>
                <p>{{ notification[3] }}</p>
                <pre>{{ notification[4] }}</pre>
            </li>
        {% endfor %}
    </ul>

    <ul>
        {% for post in posts %}
            <li>
                <h5>{{post[1]}}</h5>
                <p>{{post[2]}}</p>
            </li>
        {% endfor %}
    </ul>
    
</body>
</html>
